services:
  shade-agent-app:
    environment:
      AGENT_CONTRACT_ID: ${AGENT_CONTRACT_ID}           
      SPONSOR_ACCOUNT_ID: ${SPONSOR_ACCOUNT_ID}         
      SPONSOR_PRIVATE_KEY: ${SPONSOR_PRIVATE_KEY}       
    platform: linux/amd64                                
    image: pivortex/my-first-agent@sha256:4e90e575389aef80fbe8162e04183679f1989243d1cb1847a3b4bf38f09c9a99
    container_name: shade-agent-app                    
    ports:
      - 3000:3000                                       
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock        
    restart: always                                    

  # [LOGS]
  loki:
    platform: linux/amd64                                # amd64 to match the CVM platform
    image: grafana/loki@sha256:73e905b51a7f917f7a1075e4be68759df30226e03dcb3cd2213b989cc0dc8eb4
    container_name: loki                                 # also Loki's DNS name on the docker bridge
    command: -config.file=/etc/loki/config.yaml         # path is the mount target below
    configs:
      - source: loki-config                              # the loki-config block at the bottom
        target: /etc/loki/config.yaml                    # bind-mounted as a virtual file
    volumes:
      - loki-data:/loki                                  # persistent chunks + index (LUKS-encrypted)
    restart: always

  # [LOGS] Forwarder
  alloy:
    platform: linux/amd64
    image: grafana/alloy@sha256:51aeb9d829239345070619dad3edd6873186f913c84f45b365b74574fcb38ec0
    container_name: alloy
    # `run` subcommand executes the pipeline; --server.http.listen-addr binds
    # Alloy's own admin/metrics UI on :12345 (internal only, never published).
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    configs:
      - source: alloy-config                              # the alloy-config block at the bottom
        target: /etc/alloy/config.alloy                   # path the `run` arg above expects
    volumes:
      # Read-only mount of the Docker daemon socket so Alloy can list
      # containers and stream their logs via the Docker API. `:ro` minimises
      # blast radius — Alloy can read but not control containers.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki                                              # boot order only — Alloy retries on push failures anyway
    restart: always

  # [METRICS]
  prometheus:
    platform: linux/amd64
    image: prom/prometheus@sha256:e4254400b85610324913f0dc4acf92603d9984e7519414c5a12811aa6146acc3
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml    # scrape config (which targets to pull /metrics from)
      - --storage.tsdb.path=/prometheus                  # local TSDB dir → backed by the prometheus-data volume
      - --storage.tsdb.retention.time=30d                # delete metrics older than 30 days
    configs:
      - source: prometheus-config                        # the prometheus-config block at the bottom
        target: /etc/prometheus/prometheus.yml           # path matched by --config.file above
    volumes:
      - prometheus-data:/prometheus                      # persistent TSDB blocks (LUKS-encrypted)
    restart: always

  # [TRACES]
  tempo:
    platform: linux/amd64
    image: grafana/tempo@sha256:ee21727732c7a7199cb71c3eee9153bbf23f9b0b87619f0555a0cf21a67f1a33
    container_name: tempo
    command: -config.file=/etc/tempo/config.yaml         # path matches the mount target below
    configs:
      - source: tempo-config                              # the tempo-config block at the bottom
        target: /etc/tempo/config.yaml
    # /var/tempo, NOT /tempo — the latter is the Tempo binary path inside the
    # image and Docker refuses to mount a volume on top of an existing file.
    volumes:
      - tempo-data:/var/tempo                             # persistent trace blocks + WAL (LUKS-encrypted)
    restart: always

  # [UI] Required if you keep ANY pillar above (Loki / Prometheus / Tempo).
  grafana:
    platform: linux/amd64
    image: grafana/grafana@sha256:0f86bada30d65ef9d0183b90c1e2682ac92d53d95da8bed322b984ea78a4a73a
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin                              # initial admin username
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}   # admin password (unsealed by Phala KMS in the CVM)
      GF_AUTH_ANONYMOUS_ENABLED: "false"                         # block /login bypass; force auth on every request
      GF_USERS_ALLOW_SIGN_UP: "false"                            # disable self-service account creation
    ports:
      - 3030:3000                                                # host:container — Grafana defaults to 3000, remapped to 3030 to dodge the agent
    configs:
      - source: grafana-datasources                              # the grafana-datasources block at the bottom
        target: /etc/grafana/provisioning/datasources/datasources.yaml  # canonical provisioning path read at boot
    volumes:
      - grafana-data:/var/lib/grafana                            # persistent dashboards, users, plugins (LUKS-encrypted)
    depends_on:
      - loki        # [LOGS]    drop this line if you removed `loki`
      - prometheus  # [METRICS] drop this line if you removed `prometheus`
      - tempo       # [TRACES]  drop this line if you removed `tempo`
    restart: always
configs:
  # [LOGS] config
  loki-config:
    content: |
      auth_enabled: false                        # single-tenant mode (skip the X-Scope-OrgID header requirement); does NOT control HTTP auth — that's done by Grafana in front
      server:
        http_listen_port: 3100                   # query + push API
        grpc_listen_port: 9096                   # internal gRPC (unused in single-binary mode)
        log_level: warn                          # Loki's own log verbosity
      common:
        instance_addr: 127.0.0.1
        path_prefix: /loki                       # root dir for all on-disk state (the loki-data volume)
        storage:
          filesystem:
            chunks_directory: /loki/chunks       # ingested log chunks
            rules_directory: /loki/rules         # alert / recording rules (unused here)
        replication_factor: 1                    # single-binary mode → no replicas
        ring:
          kvstore:
            store: inmemory                      # local in-memory ring (no consul / etcd needed)
      schema_config:
        configs:
          - from: 2024-01-01                     # schema valid from this date onward
            store: tsdb                          # TSDB index format (current standard)
            object_store: filesystem
            schema: v13                          # latest Loki schema version
            index:
              prefix: index_
              period: 24h                        # one index file per day
      limits_config:
        reject_old_samples: true                 # drop logs with stale timestamps
        reject_old_samples_max_age: 168h         # ...older than 7 days
        retention_period: 168h                   # delete logs after 7 days
      compactor:
        working_directory: /loki/compactor
        retention_enabled: true                  # actually enforce retention_period
        delete_request_store: filesystem
  # [LOGS] Forwarder config
  alloy-config:
    content: |
      // Stage 1: discover what to scrape — every running container on the
      // local Docker daemon becomes a target.
      discovery.docker "containers" {
        host             = "unix:///var/run/docker.sock"  // mounted by the alloy service
        refresh_interval = "5s"                            // re-scan for new/removed containers
      }

      // Stage 2: rewrite the discovery target labels so Loki sees useful names.
      // Without this every line ends up under service_name="unknown_service".
      discovery.relabel "containers" {
        targets = discovery.docker.containers.targets
        rule {
          source_labels = ["__meta_docker_container_name"]   // raw value e.g. "/loki"
          regex         = "/?(.*)"                            // strip the leading slash
          target_label  = "container"                         // resulting label: container="loki"
        }
        rule {
          source_labels = ["__meta_docker_container_name"]
          regex         = "/?(.*)"
          target_label  = "service_name"                      // mirror to OTel-aligned label
        }
      }

      // Stage 3: tail each discovered container's stdout/stderr through
      // the Docker API and forward batched lines to the loki.write receiver.
      loki.source.docker "containers" {
        host             = "unix:///var/run/docker.sock"
        targets          = discovery.relabel.containers.output  // use the relabeled targets
        forward_to       = [loki.write.default.receiver]
        refresh_interval = "5s"
      }

      // Stage 4: push to Loki via its push API.
      loki.write "default" {
        endpoint {
          url = "http://loki:3100/loki/api/v1/push"   // Loki on the internal docker bridge
        }
      }
  # [METRICS] config
  prometheus-config:
    content: |
      global:
        scrape_interval: 15s                          # how often to pull /metrics from each target
        evaluation_interval: 15s                      # how often to evaluate alert/recording rules
      scrape_configs:
        - job_name: shade-agent-app                   # the agent itself (prom-client endpoint)
          static_configs:
            - targets: ['shade-agent-app:3000']       # service DNS on the docker bridge
          metrics_path: /metrics                      # default, listed for clarity
        - job_name: prometheus                        # Prometheus's own self-metrics
          static_configs:
            - targets: ['localhost:9090']             # scrape itself in-process
        - job_name: loki                              # Loki internals (ingestion rate, errors)
          static_configs:
            - targets: ['loki:3100']
          metrics_path: /metrics
        - job_name: tempo                             # Tempo internals (span rate, queue depth)
          static_configs:
            - targets: ['tempo:3200']
          metrics_path: /metrics
  # [TRACES] config
  tempo-config:
    content: |
      server:
        http_listen_port: 3200             # HTTP API for Grafana queries (TraceQL, trace lookup)
      distributor:
        receivers:
          otlp:                            # OpenTelemetry Protocol — what the agent emits
            protocols:
              http:
                endpoint: 0.0.0.0:4318     # OTLP HTTP receiver (used by observability.ts)
      ingester:
        max_block_duration: 5m             # flush in-memory blocks at least every 5 min
      storage:
        trace:
          backend: local                   # local filesystem (no S3/GCS)
          local:
            path: /var/tempo/traces        # finalized trace blocks (the tempo-data volume)
          wal:
            path: /var/tempo/wal           # write-ahead log before the block is finalized
      compactor:
        compaction:
          block_retention: 168h            # delete trace blocks after 7 days
  # [UI] config
  grafana-datasources:
    content: |
      apiVersion: 1                       # provisioning API version (always 1 today)
      datasources:
        # [LOGS] Drop this entry if you removed the `loki` service.
        - name: Loki                      # display name in the UI
          type: loki                      # datasource plugin
          access: proxy                   # Grafana proxies queries server-side (vs. browser-direct)
          url: http://loki:3100           # service DNS on the docker bridge
          isDefault: true                 # default datasource in Explore (only ONE datasource may set this)
          editable: false                 # YAML is the source of truth — read-only in the UI
        # [METRICS] Drop this entry if you removed the `prometheus` service.
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus:9090
          editable: false
        # [TRACES] Drop this entry if you removed the `tempo` service.
        - name: Tempo
          type: tempo
          access: proxy
          url: http://tempo:3200
          editable: false
volumes:
  loki-data: {}        # [LOGS]
  prometheus-data: {}  # [METRICS]
  tempo-data: {}       # [TRACES]
  grafana-data: {}     # [UI]
