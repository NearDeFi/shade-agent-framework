name: CI

on:
  # Runs on PRs into main (the fast feedback loop) and also re-runs on
  # main->stable promotion PRs. The heavy /run-e2e suite (see e2e.yml) can be
  # run manually on main or stable PRs; it's non-blocking.
  pull_request:
    branches: [main, stable]
  push:
    branches: [main]
  # Re-run against the merge queue's combined branch before it lands on main.
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Detect which areas changed so we only run the relevant jobs. The `all`
  # filter (CI config / toolchain) forces every job to run, as does a
  # merge_group event — the queue validates the full suite before landing.
  changes:
    runs-on: ubuntu-latest
    outputs:
      js_lib: ${{ steps.filter.outputs.js_lib }}
      js_cli: ${{ steps.filter.outputs.js_cli }}
      js_tmpl: ${{ steps.filter.outputs.js_tmpl }}
      attestation: ${{ steps.filter.outputs.attestation }}
      contract: ${{ steps.filter.outputs.contract }}
      all: ${{ steps.filter.outputs.all == 'true' || github.event_name == 'merge_group' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        if: github.event_name != 'merge_group'
        id: filter
        with:
          filters: |
            js_lib:
              - 'shade-agent-js/**'
            js_cli:
              - 'shade-agent-cli/**'
            js_tmpl:
              - 'shade-agent-template/**'
            attestation:
              - 'shade-attestation/**'
            contract:
              - 'shade-contract-template/**'
              - 'shade-attestation/**'
            all:
              - '.github/workflows/**'
              - 'rust-toolchain.toml'

  shade-agent-js:
    needs: changes
    if: needs.changes.outputs.js_lib == 'true' || needs.changes.outputs.all == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shade-agent-js
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: shade-agent-js/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  shade-agent-cli:
    needs: changes
    if: needs.changes.outputs.js_cli == 'true' || needs.changes.outputs.all == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shade-agent-cli
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: shade-agent-cli/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  shade-agent-template:
    needs: changes
    # Also run when shade-agent-js changes: the template depends on it via
    # `file:../shade-agent-js`, so a breaking lib change must re-typecheck the
    # template (its `npm run build`/tsc is the only gate).
    if: >-
      needs.changes.outputs.js_tmpl == 'true' ||
      needs.changes.outputs.js_lib == 'true' ||
      needs.changes.outputs.all == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shade-agent-template
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: shade-agent-template/package-lock.json
      # The template depends on `@neardefi/shade-agent-js` via `file:../shade-agent-js`,
      # whose dist/ (incl. the .d.cts types) is gitignored and has no `prepare`
      # script — so build the sibling first or `tsc` can't resolve the import.
      - name: "Build shade-agent-js (file: dependency)"
        working-directory: shade-agent-js
        run: npm ci && npm run build
      - run: npm ci
      # No test script — `tsc` build is the typecheck gate.
      - run: npm run build

  shade-attestation:
    needs: changes
    if: needs.changes.outputs.attestation == 'true' || needs.changes.outputs.all == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shade-attestation
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # Installs the toolchain pinned in rust-toolchain.toml (+ rustfmt/clippy/wasm target).
      - run: rustup show
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: shade-attestation
      - run: cargo fmt --check
      # Lenient for now (no -D warnings); tighten once the tree is warning-clean.
      - run: cargo clippy --all-targets
      - run: cargo test

  shade-contract-template:
    needs: changes
    if: needs.changes.outputs.contract == 'true' || needs.changes.outputs.all == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shade-contract-template
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: rustup show
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: shade-contract-template
      - run: cargo fmt --check
      # clippy --all-targets still compiles the integration-test code, so test
      # compile breakage surfaces here; only the slow sandbox *runtime* (the
      # tests/*.rs integration tests) plus the wasm build move to the manual
      # /run-e2e suite (see .github/workflows/e2e.yml).
      - run: cargo clippy --all-targets
      # Unit tests only — fast. The full `cargo test` (sandbox integration
      # tests) runs in the /run-e2e suite.
      - run: cargo test --lib

  # Single required status check. Succeeds if every needed job either passed or
  # was skipped (path-filtered out); fails if any failed or was cancelled. Make
  # THIS the required check on main — not the individual jobs — so docs-only PRs
  # (all jobs skipped) still pass.
  ci-passed:
    needs:
      - changes
      - shade-agent-js
      - shade-agent-cli
      - shade-agent-template
      - shade-attestation
      - shade-contract-template
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "Job results: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::A required CI job did not succeed."
              exit 1
            fi
          done
          echo "All required jobs passed or were skipped."
