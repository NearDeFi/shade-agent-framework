name: Claude PR Assistant

# Comment-triggered: @PiVortex mentions @claude on a PR (a comment or an inline
# review comment) and Claude runs the fixed review prompt below. Authorization
# is the job-level `if:` gate (PiVortex + current org MEMBER + the @claude mention).
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Cancel an in-flight review for the same PR when a new @claude is posted, so
# repeated triggers don't stack parallel runs (and burn subscription usage).
concurrency:
  group: claude-review-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  claude:
    # Gate: a @claude mention from PiVortex who is ALSO a current NearDeFi org
    # member, on a pull request (not a plain issue). author_association is set by
    # GitHub from the commenter's org membership (not comment text), so it can't
    # be spoofed. (The `==` is case-insensitive, but GitHub only ever sends the
    # canonical login casing, so it matches the PiVortex account exactly.)
    if: >-
      github.event.comment.user.login == 'PiVortex' &&
      github.event.comment.author_association == 'MEMBER' &&
      contains(github.event.comment.body, '@claude') &&
      (github.event_name == 'pull_request_review_comment' || github.event.issue.pull_request)
    runs-on: ubuntu-latest
    permissions:
      contents: read          # read the code being reviewed
      pull-requests: write     # post review comments / replies on PRs
      issues: write            # respond on issues
    env:
      # The PR number lives in different places for the two comment events.
      PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
    steps:
      # Pinned to a commit SHA (not the movable @v4 tag) so a repointed or
      # compromised tag can't swap the action out from under us. Dependabot
      # (github-actions ecosystem, already configured) auto-PRs SHA bumps.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Review the PR's proposed merge state — on comment events a bare
          # checkout would grab the default branch, not the PR.
          ref: refs/pull/${{ env.PR_NUMBER }}/merge
          fetch-depth: 0           # full history for git blame/log/diff
          # Don't leave the checkout token in .git/config: the review feeds
          # untrusted PR content to the agent, so there's nothing for an
          # injected prompt to read and exfiltrate.
          persist-credentials: false

      - uses: anthropics/claude-code-action@fbda2eb1bdc90d319b8d853f5deb53bca199a7c1 # v1
        with:
          # Fixed review instruction — runs on every @claude trigger,
          # regardless of any extra text in the comment.
          prompt: "Review this PR following .github/copilot-instructions.md"

          # Authenticates with a Claude subscription (Max) via an OAuth token,
          # not a metered API key. Generate with `claude setup-token` and store
          # the value as the CLAUDE_CODE_OAUTH_TOKEN repo secret.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Sandbox the agent to read-only review tools plus posting the result.
          # The review reads untrusted PR content, so an injected prompt can't
          # make it edit files, run arbitrary shell, or exfiltrate over network.
          # --max-turns caps worst-case subscription usage per review.
          # (Default model is Sonnet; append `--model claude-opus-4-8` for Opus.)
          claude_args: "--max-turns 30 --allowedTools 'Read,Glob,Grep,Agent,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh search:*),Bash(git blame:*),Bash(git log:*),Bash(git diff:*)'"
