name: Claude PR Assistant

# Comment-triggered: @PiVortex mentions @claude on a PR (a comment or an inline
# review comment) and Claude runs the fixed review prompt below. Authorization
# is layered — a cheap `if:` pre-filter plus an authoritative "Authorize" step.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    # Cheap pre-filter so a runner only starts for a @claude mention from
    # PiVortex — stops random/abusive @claude comments from spinning up jobs.
    # This `==` is case-insensitive; the authoritative, case-sensitive + admin
    # checks live in the "Authorize commenter" step below.
    if: >-
      github.event.comment.user.login == 'PiVortex' &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read          # read the code being reviewed
      pull-requests: write     # post review comments / replies on PRs
      issues: write            # respond on issues
    steps:
      # Authoritative authorization — fails closed (denies on any error).
      #   1. Case-sensitive exact login match: bash `=` is case-sensitive,
      #      unlike the job-level `==`. (Note: GitHub always reports the
      #      canonical login casing, so this is belt-and-suspenders.)
      #   2. Commenter must currently hold `admin` on the repo, so access is
      #      revoked automatically if they ever lose admin.
      - name: Authorize commenter
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENTER: ${{ github.event.comment.user.login }}
        run: |
          set -euo pipefail
          if [ "$COMMENTER" != "PiVortex" ]; then
            echo "::error::'$COMMENTER' is not the authorized user."
            exit 1
          fi
          PERMISSION="$(gh api "repos/${GITHUB_REPOSITORY}/collaborators/${COMMENTER}/permission" --jq '.permission')"
          echo "Repo permission for ${COMMENTER}: ${PERMISSION}"
          if [ "$PERMISSION" != "admin" ]; then
            echo "::error::'$COMMENTER' must be a repo admin to trigger a review (has: ${PERMISSION})."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0       # full history so Claude can diff against the base

      - uses: anthropics/claude-code-action@v1
        with:
          # Fixed review instruction — runs on every @claude trigger,
          # regardless of any extra text in the comment.
          prompt: "Review this PR following .github/copilot-instructions.md"

          # Authenticates with a Claude subscription (Max) via an OAuth token,
          # not a metered API key. Generate with `claude setup-token` and store
          # the value as the CLAUDE_CODE_OAUTH_TOKEN repo secret.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # The action defaults to Sonnet. For sharper (but slower / more
          # token-hungry) reviews, switch to Opus by uncommenting:
          # claude_args: "--model claude-opus-4-8"
