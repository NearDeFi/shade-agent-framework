name: Claude PR Assistant

# Comment-triggered: @PiVortex mentions @claude on a PR (a comment or an inline
# review comment) and Claude runs the fixed review prompt below. Authorization
# is layered — a cheap `if:` pre-filter plus an authoritative "Authorize" step.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    # Gate: a @claude mention from PiVortex who is ALSO a current NearDeFi org
    # member. author_association is set by GitHub from the commenter's org
    # membership (not from comment text), so it can't be spoofed; it falls back
    # to COLLABORATOR/CONTRIBUTOR/NONE if membership is ever lost. The job-level
    # `==` is case-insensitive — the case-sensitive exact match is in the
    # "Authorize commenter" step.
    if: >-
      github.event.comment.user.login == 'PiVortex' &&
      github.event.comment.author_association == 'MEMBER' &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read          # read the code being reviewed
      pull-requests: write     # post review comments / replies on PRs
      issues: write            # respond on issues
    steps:
      # Case-sensitive exact login match — fails closed. bash `=` is
      # case-sensitive, unlike the job-level `==`. Org membership is enforced
      # by the author_association == 'MEMBER' guard in the job `if:` above.
      - name: Authorize commenter
        env:
          COMMENTER: ${{ github.event.comment.user.login }}
        run: |
          set -euo pipefail
          if [ "$COMMENTER" != "PiVortex" ]; then
            echo "::error::'$COMMENTER' is not the authorized user."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0       # full history so Claude can diff against the base

      - uses: anthropics/claude-code-action@v1
        with:
          # Fixed review instruction — runs on every @claude trigger,
          # regardless of any extra text in the comment.
          prompt: "Review this PR following .github/copilot-instructions.md"

          # Authenticates with a Claude subscription (Max) via an OAuth token,
          # not a metered API key. Generate with `claude setup-token` and store
          # the value as the CLAUDE_CODE_OAUTH_TOKEN repo secret.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # The action defaults to Sonnet. For sharper (but slower / more
          # token-hungry) reviews, switch to Opus by uncommenting:
          # claude_args: "--model claude-opus-4-8"
